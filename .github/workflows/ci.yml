name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # CI-only, non-secret placeholders. No real TON API keys are used; provider
      # calls are mocked in tests.
      DATABASE_URL: postgresql://tontracker:tontracker@localhost:5432/tontracker
      SESSION_SECRET: ci-only-session-secret-not-a-real-secret
      AUTH_SECRET: ci-only-auth-secret-not-a-real-secret-xx
      APP_URL: http://localhost:3000
      APP_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tontracker
          POSTGRES_PASSWORD: tontracker
          POSTGRES_DB: tontracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tontracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run build
      - run: docker build -t ton-wallet-tracker-app:ci .
      - name: Dependency audit (fail on high or critical)
        run: npm audit --omit=dev --audit-level=high

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Internal links only. External hosts are checked on demand via
      # `npm run check:links:external`, never in CI: a third party having a bad
      # minute must not turn this repository red.
      - name: Check Markdown links
        run: npm run check:links

      - name: Check every public document has a Russian counterpart
        run: npm run check:ru

  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Invoked directly rather than through gitleaks-action, which derives a
      # <first-pushed-commit>^..<head> range from the push event. A repository's
      # root commit has no parent, so that range is unresolvable on the first
      # push and the scan exits non-zero having read nothing. Scanning the whole
      # history every run is deterministic and matches what is run locally.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history for secrets
        run: gitleaks detect --source . --redact --no-banner --exit-code 1
