name: Сообщить об ошибке
description: Сообщить о дефекте в TON Wallet Flow Tracker
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что нашли время сообщить об ошибке. Пожалуйста, не указывайте
        в отчёте секреты, ключи API, пароли, реальные расследуемые адреса,
        хостнеймы и IP серверов. Если получится, воспроизведите проблему
        во встроенном демо-режиме.
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Ясно и коротко — в чём состоит ошибка.
      placeholder: Что пошло не так?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      description: Точные шаги, которые приводят к проблеме.
      placeholder: |
        1. Открыть «...»
        2. Нажать «...»
        3. Увидеть ошибку
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти вместо этого.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле. Приложите очищенные логи или скриншоты, если это поможет.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: Как именно вы запускаете приложение.
      value: |
        - Версия / коммит:
        - Развёртывание: (Docker Compose / локальная разработка)
        - Демо-режим: (включён / выключен)
        - Браузер и ОС:
        - Версия Node.js (при локальном запуске):
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Подтверждение
      options:
        - label: Я поискал среди существующих issue — это не дубликат.
          required: true
        - label: В этом отчёте нет секретов, ключей, реальных расследуемых адресов и деталей инфраструктуры.
          required: true
