name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please keep in mind the project's scope: it is
        a visual analytics tool for public TON on-chain data and deliberately does
        not connect wallets, move funds, or attempt to identify people.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what makes it hard today?
      placeholder: As an analyst, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or feature you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or related issues. Do not include secrets or real investigated addresses.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This request fits the project's public-data, read-only scope.
          required: true
